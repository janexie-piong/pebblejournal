<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pebble Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:ital,wght@0,200;0,300;0,400;1,200;1,300&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f0ede6;
      --ink: #1d1d1d;
      --ink-soft: #888880;
      --ink-faint: #c4c1b8;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--ink);
      font-family: 'Atkinson Hyperlegible Mono', monospace;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 48px;
      opacity: 0;
      animation: fadeUp 1s ease 0.2s forwards;
    }

    .nav-logo {
      font-family: 'Atkinson Hyperlegible Mono', monospace;
      font-weight: 300;
      font-size: 18px;
      letter-spacing: 0.08em;
      color: var(--ink);
      text-decoration: none;
    }

    .nav-cta {
      font-family: 'Atkinson Hyperlegible Mono', monospace;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-soft);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .nav-cta:hover {
      color: var(--ink);
    }

    /* ── HERO ── */
    .hero {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 120px 48px 80px;
      text-align: center;
    }

    .pebble-wrap {
      opacity: 0;
      animation: floatIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
      margin-bottom: 64px;
    }

    .pebble-wrap svg {
      width: clamp(120px, 20vw, 200px);
      height: auto;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.92);
      }
      to {
        opacity: 1;
        transform: translateY(0px) scale(1);
      }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-eyebrow {
      font-family: 'Atkinson Hyperlegible Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 1s ease 0.9s forwards;
    }

    .hero-title {
      font-family: 'Atkinson Hyperlegible Mono', monospace;
      font-weight: 300;
      font-size: clamp(28px, 5vw, 56px);
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 1s ease 1.1s forwards;
    }

    .hero-title em {
      font-style: italic;
      font-weight: 300;
    }

    .hero-sub {
      font-family: 'Atkinson Hyperlegible Mono', monospace;
      font-weight: 300;
      font-size: clamp(14px, 2vw, 17px);
      line-height: 1.7;
      color: var(--ink-soft);
      max-width: 420px;
      margin: 0 auto 48px;
      opacity: 0;
      animation: fadeUp 1s ease 1.3s forwards;
    }

    .hero-actions {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 1s ease 1.5s forwards;
    }

    .hero-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    .hero-links .btn-ghost {
      font-size: 10px;
      letter-spacing: 0.08em;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--ink);
      color: var(--bg);
      font-family: 'Atkinson Hyperlegible Mono', monospace;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 100px;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .btn-primary:hover {
      opacity: 0.75;
      transform: translateY(-1px);
    }

    .btn-ghost {
      font-family: 'Atkinson Hyperlegible Mono', monospace;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-soft);
      text-decoration: none;
      padding: 14px 4px;
      border-bottom: 1px solid var(--ink-faint);
      transition: color 0.3s ease, border-color 0.3s ease;
    }

    .btn-ghost:hover {
      color: var(--ink);
      border-color: var(--ink);
    }

    /* ── DIVIDER ── */
    .section-divider {
      width: 1px;
      height: 80px;
      background: var(--ink-faint);
      margin: 0 auto;
      opacity: 0;
      animation: fadeUp 1s ease 1.7s forwards;
    }

    /* ── FEATURES ── */
    .features {
      padding: 120px 48px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 64px 48px;
    }

    .feature {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .feature.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .feature-num {
      font-family: 'Atkinson Hyperlegible Mono', monospace;
      font-size: 13px;
      font-weight: 300;
      color: var(--ink-faint);
      letter-spacing: 0.1em;
      margin-bottom: 20px;
    }

    .feature-title {
      font-family: 'Atkinson Hyperlegible Mono', monospace;
      font-size: 22px;
      font-weight: 400;
      color: var(--ink);
      margin-bottom: 12px;
      letter-spacing: 0.01em;
    }

    .feature-body {
      font-size: 14px;
      line-height: 1.75;
      color: var(--ink-soft);
    }

    /* ── CLOSING ── */
    .closing {
      padding: 140px 48px 100px;
      text-align: center;
      max-width: 640px;
      margin: 0 auto;
    }

    .closing-pebble {
      width: clamp(40px, 6vw, 60px);
      opacity: 0.18;
      margin: 0 auto 48px;
      display: block;
    }

    .closing-text {
      font-family: 'Atkinson Hyperlegible Mono', monospace;
      font-size: clamp(28px, 5vw, 46px);
      font-weight: 300;
      font-style: italic;
      line-height: 1.3;
      color: var(--ink);
      margin-bottom: 48px;
    }

    .closing-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--ink-faint);
      padding: 32px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .footer-name {
      font-family: 'Atkinson Hyperlegible Mono', monospace;
      font-size: 15px;
      font-weight: 300;
      color: var(--ink-soft);
    }

    .footer-note {
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--ink-faint);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav {
        padding: 24px 28px;
      }

      .hero {
        padding: 100px 28px 60px;
      }

      .pebble-wrap {
        margin-bottom: 48px;
      }

      .features {
        padding: 80px 28px;
      }

      .features-grid {
        grid-template-columns: 1fr;
        gap: 48px;
      }

      .closing {
        padding: 100px 28px 80px;
      }

      footer {
        padding: 28px;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
    }

    @media (max-width: 480px) {
      .hero-actions {
        flex-direction: column;
        width: 100%;
      }

      .btn-primary {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>

      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
